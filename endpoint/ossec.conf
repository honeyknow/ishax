<!--
  ISHAX EDR — Pre-configured ossec.conf for Wazuh Agent
  ======================================================
  This file is bundled inside ISHAX_Setup.exe by Inno Setup.
  It replaces the default ossec.conf that Wazuh's MSI installer creates.

  Key settings:
    - WAZUH_MANAGER: agents.weknows.me  (DNS-based, no hardcoded IP)
    - Port:          1514 TCP            (Wazuh native protocol)
    - Event channels: Sysmon, Security, System, PowerShell, ISHAX-AMSI
    - Disabled:       syscheck, vuln-detector, SCA, active-response
                      (these modules generate noise and consume CPU)
-->
<ossec_config>

  <!-- ================================================================
       Manager connection
       LAB MODE: Using localhost (127.0.0.1) — Wazuh Manager and endpoint
       are on the same machine.

       TO SWITCH TO PRODUCTION (SaaS):
         Change <address> to:  agents.weknows.me
         Change <port>    to:  1514

       For another PC on same LAN, change address to server's LAN IP,
       e.g.: 192.168.1.10
       ================================================================ -->
  <client>
    <server>
      <address>127.0.0.1</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>ishax-endpoints</config-profile>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
    <crypto_method>aes</crypto_method>
  </client>


  <!-- ================================================================
       Logging
       ================================================================ -->
  <logging>
    <log_format>plain</log_format>
  </logging>

  <!-- ================================================================
       Disabled modules (reduce CPU/RAM overhead on endpoint)
       ================================================================ -->
  <syscheck>
    <disabled>yes</disabled>
  </syscheck>

  <rootcheck>
    <disabled>yes</disabled>
  </rootcheck>

  <wodle name="syscollector">
    <disabled>yes</disabled>
  </wodle>

  <wodle name="vulnerability-detector">
    <disabled>yes</disabled>
  </wodle>

  <sca>
    <enabled>no</enabled>
  </sca>

  <active-response>
    <disabled>yes</disabled>
  </active-response>

  <!-- ================================================================
       Windows Event Channels
       All channels required by the ISHAX detection pipeline.
       ================================================================ -->

  <!-- Sysmon: Process Create/Terminate, Network, Registry, File -->
  <localfile>
    <location>Microsoft-Windows-Sysmon/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- Security: Logon events, Account management, Service installs -->
  <localfile>
    <location>Security</location>
    <log_format>eventchannel</log_format>
    <query>Event/System[
      EventID=4624 or EventID=4625 or EventID=4697 or
      EventID=4720 or EventID=4732 or EventID=4662 or
      EventID=4769 or EventID=4771 or EventID=4728 or
      EventID=4741 or EventID=4756
    ]</query>
  </localfile>

  <!-- System: New service installed (EID 7045 — T1543.003) -->
  <localfile>
    <location>System</location>
    <log_format>eventchannel</log_format>
    <query>Event/System[EventID=7045]</query>
  </localfile>

  <!-- PowerShell: ScriptBlock logging (EID 4104 — T1059.001) -->
  <localfile>
    <location>Microsoft-Windows-PowerShell/Operational</location>
    <log_format>eventchannel</log_format>
    <query>Event/System[EventID=4103 or EventID=4104]</query>
  </localfile>

  <!-- RDP Session Manager: Remote logon tracking -->
  <localfile>
    <location>Microsoft-Windows-TerminalServices-LocalSessionManager/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ISHAX AMSI: Custom channel written by amsi_watcher.exe service -->
  <localfile>
    <location>ISHAX-AMSI</location>
    <log_format>eventchannel</log_format>
  </localfile>

</ossec_config>
