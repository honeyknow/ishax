# Adapted from: https://github.com/SigmaHQ/sigma/blob/master/rules/windows/process_creation/proc_creation_win_remote_access_tools.yml
# Locked variant: Image matches known RMM tool names AND NOT running from Program Files (allowlist).
# Generic "RMM tool name anywhere" causes false positives for IT teams — path filter required. Guards against False Alert (2).
# Guarding against: False Alert (1 & 2) — process name alone is insufficient; path-based allowlist is mandatory.
title: Remote Management Tool Abuse
id: a8675646-cd24-4903-875c-ce3d17db3008
status: test
description: Detects execution of common RMM tools like AnyDesk, TeamViewer, or ScreenConnect. Guarding against False Alerts (1 & 2) via path filter.
author: Antigravity
date: 2026/07/10
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith:
            - '\AnyDesk.exe'
            - '\TeamViewer_Service.exe'
            - '\ScreenConnect.ClientService.exe'
            - '\ngrok.exe'
            
    filter:
        Image|startswith:
            - 'C:\Program Files\'
            - 'C:\Program Files (x86)\'
    
    condition: selection and not filter
falsepositives:
    - Legitimate IT use
level: medium

tags:
    - attack.command_and_control
    - attack.t1219

    - custom.edr_enhanced
