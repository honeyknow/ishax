# Layer B (cmdline) of the dual-layer T1059.001 detection.
# Layer A (AMSI content matching) is implemented in detector.py check_amsi_layer().
# Adapted from:
#   SigmaHQ: rules/windows/process_creation/proc_creation_win_powershell_encoded_cmd.yml
#   SigmaHQ: rules/windows/powershell/powershell_script/posh_ps_malicious_commandlets.yml
# This rule fires on command-line indicators only (Sysmon EID 1).
# When AMSI corroboration arrives within 30s, confidence is upgraded to HIGH.
# If only this rule fires, confidence = MEDIUM + no_amsi_corroboration = 1
# (could indicate AMSI bypass — see detector.py §3 merge logic).
title: PowerShell Suspicious Cmdline — Layer B (Dual-Layer T1059.001)
id: c13454b6-ce2c-4903-875c-ce3d17db2388
status: test
description: >
  Detects suspicious PowerShell command-line indicators: encoded commands,
  hidden-window+nop combos, and download-cradle patterns.
  This is Layer B of the T1059.001 dual-layer detection. Confidence is MEDIUM
  until AMSI Layer A corroborates within a 30-second window (§3).
  If this fires alone with no_amsi_corroboration=1, AMSI bypass is possible.
author: Antigravity / ISHAX v2
date: 2026/07/11
references:
  - https://github.com/SigmaHQ/sigma/blob/master/rules/windows/process_creation/proc_creation_win_powershell_encoded_cmd.yml
  - https://attack.mitre.org/techniques/T1059/001/
logsource:
  category: process_creation
  product: windows
detection:
  selection_cmd:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'

  selection_encoded:
    CommandLine|contains:
      - '-EncodedCommand'
      - '-EncodedC'
      - '-enc '
      - '-en '

  selection_hidden_nop:
    CommandLine|contains|all:
      - '-WindowStyle Hidden'
      - '-NonInteractive'
    CommandLine|contains:
      - '-nop'
      - '-NoProfile'

  selection_hidden_only:
    CommandLine|contains:
      - '-w hidden'
      - '-window hidden'
      - '-WindowStyle Hidden'

  selection_cradle:
    CommandLine|contains:
      - 'Net.WebClient'
      - 'DownloadString'
      - 'DownloadFile'
      - 'Invoke-WebRequest'
      - 'Start-BitsTransfer'
      - 'AppPathBypass'
      - 'Invoke-AppPathBypass'

  # Encoded commands can appear without the powershell.exe image (e.g. via pwsh or alias)
  condition: selection_cmd and (selection_encoded or selection_hidden_nop or selection_hidden_only or selection_cradle)

falsepositives:
  - Admin scripts using encoded commands (allowlist by hash/process path if recurring)
  - SCCM / Intune deployment scripts using hidden windows
level: high

tags:
  - attack.execution
  - attack.t1059.001

    - custom.edr_enhanced
