# Adapted from: https://github.com/SigmaHQ/sigma/blob/master/rules/windows/process_creation/proc_creation_win_system_exe_anomaly.yml
# Locked variant: OriginalFileName does NOT match the actual Image path — binary renamed to impersonate system process.
# Generic "process from unusual location" is too broad; we require OriginalFileName mismatch specifically.
# Guarding against: Missing Logs (2) — Sysmon EID 1 must capture OriginalFileName field (requires permissive config).
title: Process Masquerading
id: b5675646-cd24-4903-875c-ce3d17db2503
status: test
description: Detects processes where OriginalFileName does not match the actual Image filename, or common system binaries executing from suspicious paths. Guarding against Missing Logs (2).
author: Antigravity
date: 2026/07/10
logsource:
    category: process_creation
    product: windows
detection:
    selection_cmd:
        OriginalFileName: 'cmd.exe'
    filter_cmd:
        Image|endswith: '\cmd.exe'

    selection_svchost:
        OriginalFileName: 'svchost.exe'
    filter_svchost:
        Image|endswith: '\svchost.exe'
        
    selection_powershell:
        OriginalFileName: 'PowerShell.EXE'
    filter_powershell:
        Image|endswith: '\powershell.exe'

    condition: (selection_cmd and not filter_cmd) or (selection_svchost and not filter_svchost) or (selection_powershell and not filter_powershell)
falsepositives:
    - Custom compiled binaries reusing system metadata
level: high

tags:
    - attack.defense_evasion
    - attack.t1036
